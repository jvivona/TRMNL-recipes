<div class="layout layout--col layout--stretch gap--medium">
  <div class="flex flex--col flex--center flex--middle">
    <span class="title title--large text--center">{{ title }}</span>
    <span class="title title--base text--center">{{ reference }}</span>
  </div>
  <div class="flex flex--col gap--small">
    <span class="description description--xlarge">{{ summary }}</span>
  </div>
  <div class="flex flex--col gap--small">
    <span class="description description--large">{{ expanded_text }}</span>
  </div>
</div>
<div class="title_bar">
  <img class="image" src="https://raw.githubusercontent.com/jvivona/tidbyt-data/refs/heads/main/aa/aareflection_icon.svg" alt="AA">
  <span class="title">AA Daily Reflection</span>
  <span class="instance">{{ date }}</span>
</div>
